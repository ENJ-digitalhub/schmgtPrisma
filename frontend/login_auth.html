<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eCampus | [schoolName]</title>
    <link rel="stylesheet" href="css/root.css">

</head>
<body class="flex justify-center items-center h-screen w-screen">
    <main class="bg-[var(--bg-main)] max-w-[400px] max-h-[500px] h-full w-full rounded-[var(--radius-lg)] p-[var(--padding-lg)]">
        <form class="flex flex-col h-full w-full justify-around items-center">
            <h1 class="text-[36px]">SIGN IN</h1>
            <button class="bg-[var(--primary)] font-bold text-[var(--bg-main)] w-full h-[40px] rounded-[var(--radius-md)] hover:bg-[var(--primary-hover)]">Google</button>
            <div class="flex flex-row w-full items-center gap-[10px]">
                <hr class="flex-1 border border-[1px]">
                <p class="font-bold">or</p>
                <hr class="flex-1 border border-[1px]">    
            </div>
            <input type="text" placeholder="Email" class="w-full rounded-[var(--radius-md)] h-[40px] p-[var(--padding-md)] bg-[var(--bg-light)] ">
            <input type="password" placeholder="Password" class="w-full rounded-[var(--radius-md)] h-[40px] p-[var(--padding-md)] bg-[var(--bg-light)] ">
            <a href="" class="hover:underline hover:text-blue-500 font-bold">Forgot password?</a>
            <button class="bg-[var(--primary)] font-bold text-[var(--bg-main)] w-full h-[40px] rounded-[var(--radius-md)] hover:bg-[var(--primary-hover)]">Sign in</button>

        </form>

    </main>
    <!-- Using Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src=""></script>

</body>
</html>
