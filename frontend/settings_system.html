<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | [schoolName]</title>
    <link rel="stylesheet" href="css/root.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header class="sticky top-0 z-50 flex items-center justify-between px-[var(--padding-md)] md:px-[var(--padding-lg)] py-[var(--padding-sm)] bg-[var(--primary-hover)] backdrop-blur-md shadow-sm">
        <div class="flex items-center gap-3">
            <button type="button" class="flex items-center justify-center w-[42px] h-[42px] rounded-[var(--radius-md)] text-[var(--text-main)] hover:bg-white/10 transition md:hidden" aria-label="Open menu">
                <i id="menuToggle" class="fa-solid fa-arrow-left text-[20px]"></i>
            </button>
            <h1 class="text-[var(--bg-main)] font-semibold text-[20px] md:text-[26px] tracking-wide">
                Settings
            </h1>
        </div>
        <div class="flex items-center gap-4">
            <button class="relative flex items-center justify-center w-[40px] h-[40px] rounded-full hover:bg-white/10 transition">
                <i class="fa-regular fa-bell text-[20px] text-[var(--text-main)]"></i>
                <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
            <div class="flex items-center gap-2 cursor-pointer group">
                <img src="/frontend/img/FB_IMG_1738065673948.jpg.jpeg" class="w-[40px] h-[40px] object-cover rounded-full ring-2 ring-transparent group-hover:ring-white/40 transition">
                <span class="hidden md:block text-sm text-[var(--text-main)]">
                    Admin
                </span>
            </div>
        </div>
    </header>

    <section class="flex flex-col md:flex-row md:justify-between h-[calc(100vh-56px)]">
        <nav class="hidden w-screen h-[calc(100vh-180px)] fixed px-[var(--padding-sm)] py-[var(--padding-sm)] bg-[var(--bg-main)] text-[var(--text-secondary)] flex flex-col gap-[var(--padding-sm)] overflow-x-auto md:w-[200px] md:fixed md:top-[56px] md:h-[calc(100vh-56px)] md:py-[var(--padding-md)] md:flex">
            <button class="bg-[var(--bg-light)] rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)]">Home</button>
            <button class="bg-[var(--bg-light)] rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)]">Management</button>
 <div class="hidden flex flex-col rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)] [var(--transition-smooth)]">
                <button class="bg-[var(--bg-light)] rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)] [var(--transition-smooth)]">Student</button>
                <button class="bg-[var(--bg-light)] rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)] [var(--transition-smooth)]">Teacher</button>
                <button class="bg-[var(--bg-light)] rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)] [var(--transition-smooth)]">Class</button>
                <button class="bg-[var(--bg-light)] rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)] [var(--transition-smooth)]">Subject</button>
            </div>
            <button class="bg-[var(--bg-light)] rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)]">Message</button>
            <button class="bg-[var(--bg-light)] rounded-[var(--radius-md)] px-[var(--padding-md)] py-[var(--padding-sm)] font-bold text-[var(--text-muted)] my-[var(--padding-sm)] whitespace-nowrap hover:bg-[var(--bg-main)] hover:text-white transition-all duration-[var(--transition-smooth-time)] mt-auto">Settings</button>
        </nav>

        <main class="min-h-screen m-[var(--padding-sm)] bg-transparent rounded-[var(--radius-lg)] w-full md:m-[var(--padding-lg)] md:ml-[calc(200px+var(--padding-lg))] grid grid-cols-1 gap-[var(--padding-lg)]">
            <!-- Profile Section -->
            <section class="bg-white/5 rounded-[var(--radius-lg)] p-[var(--padding-lg)] flex flex-col gap-[var(--padding-md)]">
                <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-[var(--padding-md)]">
                    <div class="flex items-center gap-[var(--padding-md)]">
                        <img src="img/FB_IMG_1738065673948.jpg.jpeg" alt="Profile Pic" class="w-20 h-20 rounded-[var(--radius-md)] object-cover">
                        <div class="flex flex-col gap-1">
                            <p class="text-sm opacity-60">@username</p>
                            <h2 class="text-2xl font-bold">Fullname</h2>
                            <p class="text-xs opacity-50">Admin Account</p>
                        </div>
                    </div>
                    <button class="p-[var(--padding-sm)] rounded-[var(--radius-md)] bg-white/10 hover:bg-[var(--primary)] hover:text-white transition-all duration-[var(--transition-smooth-time)]">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>
            </section>

            <!-- Settings Options -->
            <section class="bg-white/5 rounded-[var(--radius-lg)] p-[var(--padding-lg)] flex flex-col gap-[var(--padding-md)]">
                <h3 class="text-lg font-bold">Account Settings</h3>
                
                <!-- Change Password -->
                <button class="w-full bg-white/5 hover:bg-white/10 rounded-[var(--radius-md)] p-[var(--padding-md)] flex items-center justify-between transition-all duration-[var(--transition-smooth-time)] group">
                    <div class="flex items-center gap-[var(--padding-md)]">
                        <div class="w-10 h-10 rounded-[var(--radius-sm)] bg-white/10 group-hover:bg-[var(--primary)] flex items-center justify-center transition">
                            <i class="fas fa-lock text-sm"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-semibold text-sm">Change Password</p>
                            <p class="text-xs opacity-60">Update your password</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right opacity-40 group-hover:opacity-100 transition"></i>
                </button>

                <!-- Roles & Permissions -->
                <button class="w-full bg-white/5 hover:bg-white/10 rounded-[var(--radius-md)] p-[var(--padding-md)] flex items-center justify-between transition-all duration-[var(--transition-smooth-time)] group">
                    <div class="flex items-center gap-[var(--padding-md)]">
                        <div class="w-10 h-10 rounded-[var(--radius-sm)] bg-white/10 group-hover:bg-[var(--primary)] flex items-center justify-center transition">
                            <i class="fas fa-shield-halved text-sm"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-semibold text-sm">Roles & Permissions</p>
                            <p class="text-xs opacity-60">Manage your access level</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right opacity-40 group-hover:opacity-100 transition"></i>
                </button>

                <!-- Preferences -->
                <button class="w-full bg-white/5 hover:bg-white/10 rounded-[var(--radius-md)] p-[var(--padding-md)] flex items-center justify-between transition-all duration-[var(--transition-smooth-time)] group">
                    <div class="flex items-center gap-[var(--padding-md)]">
                        <div class="w-10 h-10 rounded-[var(--radius-sm)] bg-white/10 group-hover:bg-[var(--primary)] flex items-center justify-center transition">
                            <i class="fas fa-sliders text-sm"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-semibold text-sm">Preferences</p>
                            <p class="text-xs opacity-60">Customize your experience</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right opacity-40 group-hover:opacity-100 transition"></i>
                </button>

                <!-- Logout -->
                <button class="w-full bg-red-500/20 hover:bg-red-500/40 rounded-[var(--radius-md)] p-[var(--padding-md)] flex items-center justify-between transition-all duration-[var(--transition-smooth-time)] group text-red-400">
                    <div class="flex items-center gap-[var(--padding-md)]">
                        <div class="w-10 h-10 rounded-[var(--radius-sm)] bg-red-500/40 group-hover:bg-red-500/60 flex items-center justify-center transition">
                            <i class="fas fa-sign-out-alt text-sm"></i>
                        </div>
                        <div class="text-left">
                            <p class="font-semibold text-sm">Logout</p>
                            <p class="text-xs opacity-60">Sign out of your account</p>
                        </div>
                    </div>
                    <i class="fas fa-chevron-right opacity-40 group-hover:opacity-100 transition"></i>
                </button>
            </section>
        </main>
    </section>

    <!-- Using Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/header.js"></script>
    <script src="js/nav.js"></script>
</body>
</html>
